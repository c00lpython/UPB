[PROJECT]
name = MyParser
version = 1.0
description = Парсер для сбора данных

[BROWSER]
headless = true                  # true - скрытый, false - с окном
user_agent = default             # default или свой UA
window_size = 1920x1080
timeout = 10
wait_between_requests = 1
retry_count = 3

[URLS]
# Основной URL для парсинга
main = https://example.com
# Дополнительные URL (JSON список)
additional = [
    "https://example.com/page2",
    "https://example.com/page3"
]

[VARIABLES]
# Переменные для парсинга (JSON формат)
items = [
    {"name": "title", "xpath": "//h1", "type": "static"},
    {"name": "price", "xpath": "//span[@class='price']", "type": "dynamic"},
    {"name": "description", "xpath": "//meta[@name='description']/@content", "type": "static"}
]

[AUTH]
# Данные для входа (если нужны)
enabled = false
login_url = https://example.com/login
username = your_username
password = your_password
# API ключи (JSON список)
api_keys = [
    "key1",
    "key2"
]

[OUTPUT]
format = excel                  # excel, json, csv, all
excel_path = output.xlsx
json_path = output.json
csv_path = output.csv

[TELEGRAM]
enabled = false
bot_token = YOUR_BOT_TOKEN
chat_id = YOUR_CHAT_ID
send_on_success = true
send_on_error = true

[LOGGING]
level = INFO                    # DEBUG, INFO, WARNING, ERROR
log_file = parser.log