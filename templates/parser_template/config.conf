[PROJECT]
name = UPBParser
description = Parser with CloakBrowser stealth mode

[PATHS]
project_dir = ./
script_path = ./script.txt
variables_path = ./variables.xlsx
output_path = ./output.xlsx

[BROWSER]
headless = false
timeout = 30
wait_between_requests = 2
retry_count = 3

[URLS]
main = https://www.avito.ru
additional = []

[OUTPUT]
formats = excel,plotly   # excel, csv, json, plotly
plotly_output = plotly

[LOGGING]
level = INFO
log_file = parser.log

[PROXY]
enabled = false
rotate_interval = 10
list =

[TELEGRAM]
enabled = false
bot_token =
chat_id =
send_on_success = true
send_on_error = true

[BOT]
enabled = false
token =